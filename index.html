<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .calculator {
            background: #1e272e;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .clear-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .clear-btn:active {
            background: #c0392b;
        }
        .history {
            background: #0a0a0a;
            color: #888;
            text-align: right;
            padding: 8px 15px;
            font-size: 12px;
            min-height: 80px;
            max-height: 80px;
            overflow-y: auto;
            border-radius: 10px 10px 0 0;
            line-height: 1.4;
        }
        .history div {
            margin: 2px 0;
        }
        #display {
            width: 100%;
            height: 70px;
            background: #0a0a0a;
            color: white;
            text-align: right;
            padding: 15px;
            font-size: 32px;
            border: none;
            border-radius: 0 0 10px 10px;
            margin-bottom: 15px;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 20px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            background: #34495e;
            color: white;
        }
        button:active {
            opacity: 0.7;
        }
        .operator {
            background: #f39c12;
        }
        .equals {
            background: #27ae60;
        }
        .clear {
            background: #e74c3c;
        }
        .zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <button class="clear-btn" onclick="clearHistory()">Clear History</button>
        <div class="history" id="history"></div>
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="btn" onclick="toggleSign()">+/-</button>
            <button class="operator" onclick="appendToDisplay('/')">/</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="equals" onclick="calculate()">=</button>
            
            <button class="zero" onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
        </div>
    </div>

    <script>
        function toggleSign() {
  if (currentInput === '' || currentInput === '0') return;
  
  if (currentInput.startsWith('-')) {
    currentInput = currentInput.slice(1);
  } else {
    currentInput = '-' + currentInput;
  }
  updateDisplay();
}
        let display = document.getElementById('display');
        let history = document.getElementById('history');
        let currentInput = '';
        let historyLines = [];

        window.onload = function() {
            const savedHistory = localStorage.getItem('calcHistoryArray');
            if (savedHistory) {
                historyLines = JSON.parse(savedHistory);
                updateHistoryDisplay();
            }
        }

        // KEYBOARD SUPPORT - NEW CODE
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if (key >= '0' && key <= '9' || key === '.') {
                appendToDisplay(key);
            } else if (key === '+' || key === '-') {
                appendToDisplay(key);
            } else if (key === '*') {
                appendToDisplay('*');
            } else if (key === '/') {
                event.preventDefault();
                appendToDisplay('/');
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearDisplay();
            } else if (key === 'Backspace') {
                deleteLast();
            }
        });

        function updateHistoryDisplay() {
            history.innerHTML = '';
            historyLines.slice(-5).forEach(line => {
                history.innerHTML += `<div>${line}</div>`;
            });
            history.scrollTop = history.scrollHeight;
        }

        function appendToDisplay(value) {
            currentInput += value;
            display.value = currentInput;
        }

        function clearDisplay() {
            currentInput = '';
            display.value = '';
        }

        function deleteLast() {
            currentInput = currentInput.slice(0, -1);
            display.value = currentInput;
        }

        function calculate() {
            try {
                let expression = currentInput.replace(/×/g, '*');
                let result = eval(expression);
                
                if (result !== undefined) {
                    let historyEntry = `${currentInput} = ${result}`;
                    historyLines.push(historyEntry);
                    if (historyLines.length > 5) {
  historyLines.shift();
}                 localStorage.setItem('calcHistoryArray', JSON.stringify(historyLines));
                    updateHistoryDisplay();         
document.getElementById('display').textContent = result;
currentInput = result.toString();
    }
  } catch (error) {
    document.getElementById('display').textContent = 'Error';
    currentInput = '';
  }            }
        }

        function clearHistory() {
            historyLines = [];
            history.innerHTML = '';
            localStorage.removeItem('calcHistoryArray');
        }
    </script>
</body>
</html>
