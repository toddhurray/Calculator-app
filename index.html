<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a1a">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .calculator {
      background: #2d2d2d;
      border-radius: 20px;
      padding: 20px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    
    .display {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      text-align: right;
      font-size: 2.5em;
      margin-bottom: 10px;
      min-height: 70px;
      word-wrap: break-word;
      overflow: hidden;
    }
    
    .history {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      min-height: 60px;
      max-height: 100px;
      overflow-y: auto;
      font-size: 0.9em;
      color: #888;
    }
    
    .history-item {
      padding: 5px 0;
      border-bottom: 1px solid #333;
    }
    
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    
    button {
      padding: 20px;
      font-size: 1.2em;
      border: none;
      border-radius: 10px;
      background: #3d3d3d;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:active {
      transform: scale(0.95);
      background: #4d4d4d;
    }
    
    button.operator {
      background: #ff9500;
    }
    
    button.operator:active {
      background: #ffaa33;
    }
    
    button.clear {
      background: #a6a6a6;
      color: black;
    }
    
    button.equals {
      background: #ff9500;
      grid-column: span 2;
    }
    
    .clear-history {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: #ff3b30;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="history" id="history"></div>
    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="clear" onclick="deleteLast()">⌫</button>
      <button class="clear" onclick="toggleSign()">+/-</button>
      <button class="operator" onclick="appendToDisplay('/')">/</button>
      
      <button onclick="appendToDisplay('7')">7</button>
      <button onclick="appendToDisplay('8')">8</button>
      <button onclick="appendToDisplay('9')">9</button>
      <button class="operator" onclick="appendToDisplay('*')">×</button>
      
      <button onclick="appendToDisplay('4')">4</button>
      <button onclick="appendToDisplay('5')">5</button>
      <button onclick="appendToDisplay('6')">6</button>
      <button class="operator" onclick="appendToDisplay('-')">-</button>
      
      <button onclick="appendToDisplay('1')">1</button>
      <button onclick="appendToDisplay('2')">2</button>
      <button onclick="appendToDisplay('3')">3</button>
      <button class="operator" onclick="appendToDisplay('+')">+</button>
      
      <button onclick="appendToDisplay('0')">0</button>
      <button onclick="appendToDisplay('.')">.</button>
      <button class="equals" onclick="calculate()">=</button>
    </div>
    <button class="clear-history" onclick="clearHistory()">Clear History</button>
  </div>

  <script>
    let currentInput = '0';
    let historyLines = [];
    let history;

    window.onload = function() {
      history = document.getElementById('history');
      
      const savedHistory = localStorage.getItem('calcHistory');
      if (savedHistory) {
        historyLines = JSON.parse(savedHistory);
      }
      
      document.getElementById('display').textContent = '0';
      updateHistoryDisplay();
      
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js');
      }
    }

    function appendToDisplay(value) {
      if (currentInput === '0' && value !== '.') {
        currentInput = value;
      } else {
        currentInput += value;
      }
      document.getElementById('display').textContent = currentInput;
    }

    function clearDisplay() {
      currentInput = '0';
      document.getElementById('display').textContent = '0';
    }

    function deleteLast() {
      currentInput = currentInput.slice(0, -1);
      if (currentInput === '') currentInput = '0';
      document.getElementById('display').textContent = currentInput;
    }

    function toggleSign() {
      if (currentInput === '0') return;
      if (currentInput.startsWith('-')) {
        currentInput = currentInput.slice(1);
      } else {
        currentInput = '-' + currentInput;
      }
      document.getElementById('display').textContent = currentInput;
    }

    function calculate() {
      try {
        const result = eval(currentInput);
        const calculation = currentInput + ' = ' + result;
        
        historyLines.push(calculation);
        localStorage.setItem('calcHistory', JSON.stringify(historyLines));
        updateHistoryDisplay();
        
        currentInput = result.toString();
        document.getElementById('display').textContent = currentInput;
      } catch (error) {
        document.getElementById('display').textContent = 'Error';
        currentInput = '0';
      }
    }

    function updateHistoryDisplay() {
      history.innerHTML = '';
      historyLines.slice(-5).forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.textContent = item;
        history.appendChild(div);
      });
    }

    function clearHistory() {
      historyLines = [];
      localStorage.removeItem('calcHistory');
      updateHistoryDisplay();
    }

    // Keyboard support
    document.addEventListener('keydown', function(event) {
      if (event.key >= '0' && event.key <= '9' || event.key === '.') {
        appendToDisplay(event.key);
      } else if (event.key === '+' || event.key === '-' || event.key === '*' || event.key === '/') {
        appendToDisplay(event.key);
      } else if (event.key === 'Enter' || event.key === '=') {
        calculate();
      } else if (event.key === 'Escape') {
        clearDisplay();
      } else if (event.key === 'Backspace') {
        deleteLast();
      }
    });
  </script>
</body>
</html>
