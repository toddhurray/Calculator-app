<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .calculator {
            background: #1e272e;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .clear-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .clear-btn:active {
            background: #c0392b;
        }
        .history {
            background: #0a0a0a;
            color: #888;
            text-align: right;
            padding: 5px 15px;
            font-size: 14px;
            min-height: 20px;
            border-radius: 10px 10px 0 0;
            word-wrap: break-word;
        }
        #display {
            width: 100%;
            height: 80px;
            background: #0a0a0a;
            color: white;
            text-align: right;
            padding: 15px;
            font-size: 32px;
            border: none;
            border-radius: 0 0 10px 10px;
            margin-bottom: 15px;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 20px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            background: #34495e;
            color: white;
        }
        button:active {
            opacity: 0.7;
        }
        .operator {
            background: #f39c12;
        }
        .equals {
            background: #27ae60;
        }
        .clear {
            background: #e74c3c;
        }
        .zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <button class="clear-btn" onclick="clearHistory()">Clear History</button>
        <div class="history" id="history"></div>
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendToDisplay('/')">/</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="equals" onclick="calculate()">=</button>
            
            <button class="zero" onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let history = document.getElementById('history');
        let currentInput = '';

        window.onload = function() {
            const savedHistory = localStorage.getItem('calcHistory');
            if (savedHistory) {
                history.textContent = savedHistory;
            }
        }

        function appendToDisplay(value) {
            currentInput += value;
            display.value = currentInput;
        }

        function clearDisplay() {
            currentInput = '';
            display.value = '';
        }

        function deleteLast() {
            currentInput = currentInput.slice(0, -1);
            display.value = currentInput;
        }

        function calculate() {
            try {
                let expression = currentInput.replace(/×/g, '*');
                let result = eval(expression);
                
                if (result !== undefined) {
                    history.textContent = currentInput + ' =';
                    localStorage.setItem('calcHistory', history.textContent);
                    display.value = result;
                    currentInput = result.toString();
                }
            } catch (error) {
                display.value = 'Error';
                currentInput = '';
            }
        }

        function clearHistory() {
            history.textContent = '';
            localStorage.removeItem('calcHistory');
        }
    </script>
</body>
</html>
